<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="40%" style="stop-color:#0d1025"/>
      <stop offset="100%" style="stop-color:#0f0a20"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#1a0a3a;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:transparent;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="35%">
      <stop offset="0%" style="stop-color:#0a1a3a;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:transparent;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#150a30;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:transparent;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#glow1)"/>
  <rect width="1920" height="1080" fill="url(#glow2)"/>
  <rect width="1920" height="1080" fill="url(#glow3)"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="0" x2="1920" y2="0"/>
    <line x1="0" y1="120" x2="1920" y2="120"/>
    <line x1="0" y1="240" x2="1920" y2="240"/>
    <line x1="0" y1="360" x2="1920" y2="360"/>
    <line x1="0" y1="480" x2="1920" y2="480"/>
    <line x1="0" y1="600" x2="1920" y2="600"/>
    <line x1="0" y1="720" x2="1920" y2="720"/>
    <line x1="0" y1="840" x2="1920" y2="840"/>
    <line x1="0" y1="960" x2="1920" y2="960"/>
    <line x1="0" y1="0" x2="0" y2="1080"/>
    <line x1="240" y1="0" x2="240" y2="1080"/>
    <line x1="480" y1="0" x2="480" y2="1080"/>
    <line x1="720" y1="0" x2="720" y2="1080"/>
    <line x1="960" y1="0" x2="960" y2="1080"/>
    <line x1="1200" y1="0" x2="1200" y2="1080"/>
    <line x1="1440" y1="0" x2="1440" y2="1080"/>
    <line x1="1680" y1="0" x2="1680" y2="1080"/>
    <line x1="1920" y1="0" x2="1920" y2="1080"/>
  </g>

  <!-- Floating shapes -->
  <!-- Triangle -->
  <polygon points="300,200 340,140 380,200" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.08"/>
  <!-- Circle -->
  <circle cx="1600" cy="300" r="50" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.06"/>
  <!-- Diamond -->
  <polygon points="960,100 1000,150 960,200 920,150" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.07"/>
  <!-- Hexagon -->
  <polygon points="200,700 230,670 270,670 300,700 270,730 230,730" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.06"/>
  <!-- Star -->
  <polygon points="1500,800 1510,775 1530,770 1515,755 1520,735 1500,745 1480,735 1485,755 1470,770 1490,775" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.07"/>
  <!-- Square -->
  <rect x="700" y="750" width="60" height="60" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.05" transform="rotate(15 730 780)"/>
  <!-- Pentagon -->
  <polygon points="1200,500 1230,480 1260,500 1250,530 1210,530" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.05"/>

  <!-- Subtle particles -->
  <circle cx="150" cy="400" r="1.5" fill="#6366f1" opacity="0.15"/>
  <circle cx="500" cy="150" r="1" fill="#8b5cf6" opacity="0.12"/>
  <circle cx="850" cy="600" r="1.5" fill="#a78bfa" opacity="0.1"/>
  <circle cx="1100" cy="350" r="1" fill="#7c3aed" opacity="0.12"/>
  <circle cx="1400" cy="550" r="1.5" fill="#6366f1" opacity="0.1"/>
  <circle cx="1700" cy="200" r="1" fill="#8b5cf6" opacity="0.15"/>
  <circle cx="300" cy="900" r="1" fill="#a78bfa" opacity="0.12"/>
  <circle cx="800" cy="350" r="1.5" fill="#7c3aed" opacity="0.08"/>
  <circle cx="1300" cy="900" r="1" fill="#6366f1" opacity="0.1"/>
  <circle cx="1800" cy="700" r="1.5" fill="#8b5cf6" opacity="0.08"/>
</svg>
