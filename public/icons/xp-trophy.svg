<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- Windows XP style trophy icon -->
  <defs>
    <linearGradient id="cup" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#daa520"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <linearGradient id="base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a000"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
  </defs>
  <!-- Cup body -->
  <path d="M4,2 L12,2 L11,8 Q8,11 8,11 Q8,11 5,8 L4,2 Z" fill="url(#cup)" stroke="#8b6508" stroke-width="0.5"/>
  <!-- Left handle -->
  <path d="M4,3 Q1,3 1,5.5 Q1,7 3,7.5" fill="none" stroke="#daa520" stroke-width="1.2"/>
  <!-- Right handle -->
  <path d="M12,3 Q15,3 15,5.5 Q15,7 13,7.5" fill="none" stroke="#daa520" stroke-width="1.2"/>
  <!-- Stem -->
  <rect x="7" y="10" width="2" height="2.5" fill="url(#base)" stroke="#8b6508" stroke-width="0.3"/>
  <!-- Base -->
  <rect x="5" y="12.5" width="6" height="1.5" rx="0.5" fill="url(#base)" stroke="#8b6508" stroke-width="0.4"/>
  <!-- Star on cup -->
  <polygon points="8,3.5 8.7,5 10,5 9,6 9.5,7.3 8,6.5 6.5,7.3 7,6 6,5 7.3,5" fill="#fff8" stroke="none"/>
</svg>
