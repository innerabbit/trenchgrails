<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- Windows XP style folder/collection icon -->
  <defs>
    <linearGradient id="folder-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde47f"/>
      <stop offset="100%" stop-color="#f0c830"/>
    </linearGradient>
    <linearGradient id="folder-front" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe680"/>
      <stop offset="100%" stop-color="#e0b020"/>
    </linearGradient>
  </defs>
  <!-- Folder tab -->
  <path d="M1,4 L1,3 Q1,2 2,2 L6,2 L7,4 Z" fill="url(#folder-top)" stroke="#b08a00" stroke-width="0.4"/>
  <!-- Folder body -->
  <rect x="1" y="4" width="14" height="10" rx="0.5" fill="url(#folder-front)" stroke="#b08a00" stroke-width="0.5"/>
  <!-- Folder front face -->
  <rect x="1" y="6" width="14" height="8" rx="0.5" fill="url(#folder-front)" stroke="#b08a00" stroke-width="0.5"/>
  <!-- Highlight line -->
  <line x1="2" y1="7" x2="14" y2="7" stroke="#fff8" stroke-width="0.5"/>
  <!-- Cards inside hint -->
  <rect x="5" y="4.5" width="3" height="1.5" rx="0.3" fill="#fff" stroke="#ccc" stroke-width="0.3" opacity="0.7"/>
  <rect x="9" y="4.5" width="3" height="1.5" rx="0.3" fill="#fff" stroke="#ccc" stroke-width="0.3" opacity="0.5"/>
</svg>
