<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- Windows XP style speaker/volume icon -->
  <defs>
    <linearGradient id="spk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#888"/>
      <stop offset="100%" stop-color="#bbb"/>
    </linearGradient>
  </defs>
  <!-- Speaker body -->
  <polygon points="2,6 5,6 9,3 9,13 5,10 2,10" fill="url(#spk)" stroke="#555" stroke-width="0.5"/>
  <!-- Sound waves -->
  <path d="M10.5,5.5 Q12,8 10.5,10.5" fill="none" stroke="#4a8" stroke-width="0.8"/>
  <path d="M12,3.5 Q15,8 12,12.5" fill="none" stroke="#4a8" stroke-width="0.8"/>
</svg>
